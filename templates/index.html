<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #0f1318; --border: #1e2530;
    --accent: #00e5ff; --accent2: #7c3aed;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --text: #e2e8f0; --muted: #64748b;
    --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity:.12; pointer-events:none; z-index:0;
  }
  .wrap { position:relative; z-index:1; max-width:1500px; margin:0 auto; padding:24px; }

  header { display:flex; align-items:center; justify-content:space-between; padding-bottom:20px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .logo { font-family:var(--sans); font-size:26px; font-weight:800; letter-spacing:-1px; color:var(--accent); text-shadow:0 0 24px rgba(0,229,255,.25); }
  .logo span { color:var(--muted); font-weight:400; font-size:12px; font-family:var(--mono); margin-left:10px; vertical-align:middle; }
  .clock { color:var(--muted); font-size:12px; }

  .status-strip { display:flex; gap:20px; flex-wrap:wrap; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:6px; margin-bottom:22px; font-size:12px; }
  .status-item { display:flex; gap:6px; align-items:center; }
  .status-item .label { color:var(--muted); }
  .status-item .value { color:var(--text); font-weight:500; }

  .tab-bar { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .tab { padding:10px 20px; font-family:var(--mono); font-size:12px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all .15s; background:none; border-top:none; border-left:none; border-right:none; letter-spacing:.5px; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 16px; border-radius:5px; font-family:var(--mono); font-size:12px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); transition:all .15s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn:active { transform:scale(.97); }
  .btn-accent { background:rgba(0,229,255,.08); border-color:var(--accent); color:var(--accent); }

  .agents-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; margin-bottom:28px; }
  .agent-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px; transition:border-color .2s; animation:fadeUp .4s ease both; }
  .agent-card:hover { border-color:var(--accent); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .agent-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .agent-label { font-family:var(--sans); font-size:15px; font-weight:700; }
  .agent-host { color:var(--muted); font-size:11px; margin-top:2px; }
  .conn-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; margin-top:4px; }
  .conn-dot.ok   { background:var(--green); box-shadow:0 0 6px var(--green); }
  .conn-dot.fail { background:var(--red); }

  .progress-bar-wrap { background:var(--border); border-radius:3px; height:4px; margin-bottom:10px; overflow:hidden; }
  .progress-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .6s ease; }

  .agent-stats { display:flex; gap:16px; flex-wrap:wrap; }
  .stat-val { font-size:17px; font-weight:700; color:var(--accent); }
  .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .stat-ok .stat-val { color:var(--green); }
  .stat-fail .stat-val { color:var(--red); }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px; margin-bottom:20px; }
  .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .section-title { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }

  .tbl { width:100%; border-collapse:collapse; }
  .tbl th { text-align:left; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1px; padding-bottom:8px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .tbl td { padding:9px 8px 9px 0; border-bottom:1px solid var(--border); font-size:12px; vertical-align:middle; }
  .tbl tr:last-child td { border-bottom:none; }
  .up { color:var(--green); } .down { color:var(--red); }
  .rx { color:var(--accent); font-weight:600; } .tx { color:var(--accent2); font-weight:600; }

  .quota-wrap { background:var(--border); border-radius:2px; height:6px; min-width:70px; overflow:hidden; margin-bottom:2px; }
  .quota-bar { height:100%; border-radius:2px; transition:width .5s ease; }
  .quota-ok { background:var(--green); } .quota-warn { background:var(--yellow); } .quota-crit { background:var(--red); }

  .status-pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .pill-pending { background:rgba(100,116,139,.15); color:var(--muted); }
  .pill-running { background:rgba(245,158,11,.15); color:var(--yellow); animation:pulse 1.2s infinite; }
  .pill-done    { background:rgba(16,185,129,.15); color:var(--green); }
  .pill-failed  { background:rgba(239,68,68,.15); color:var(--red); }
  @keyframes pulse { 50%{opacity:.4} }

  .log-box { background:#060810; border:1px solid var(--border); border-radius:8px; padding:14px; height:300px; overflow-y:auto; font-size:11px; line-height:1.7; }
  .log-box::-webkit-scrollbar { width:4px; }
  .log-box::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .log-line { white-space:pre-wrap; word-break:break-all; }
  .log-line.info { color:#94a3b8; } .log-line.warn { color:var(--yellow); } .log-line.error { color:var(--red); } .log-line.debug { color:#475569; }

  .spinner { width:13px; height:13px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .spinner.active { display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .monitor-badge { display:inline-block; padding:1px 6px; background:rgba(124,58,237,.15); color:var(--accent2); border-radius:3px; font-size:9px; margin-left:4px; }
  .empty { color:var(--muted); font-size:12px; padding:10px 0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">NetPulse <span>coordinator panel</span></div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="clock" id="clock"></span>
      <a href="/logout" style="font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:4px 12px;border-radius:4px;transition:color .15s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">logout</a>
    </div>
  </header>

  <div class="status-strip">
    <div class="status-item"><span class="label">Date</span><span class="value" id="sDate">—</span></div>
    <div class="status-item"><span class="label">Started</span><span class="value" id="sStarted">—</span></div>
    <div class="status-item"><span class="label">Total Downloaded</span><span class="value" id="sTotalDL">—</span></div>
    <div class="status-item"><span class="label">Agents</span><span class="value" id="sAgents">—</span></div>
    <div class="status-item"><span class="label">Plan Events</span><span class="value" id="sPlanCount">—</span></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab(event,'overview')">Overview</button>
    <button class="tab" onclick="switchTab(event,'plan')">Today's Plan</button>
    <button class="tab" onclick="switchTab(event,'quota')">Quota / Metrics</button>
    <button class="tab" onclick="switchTab(event,'history')">Monthly History</button>
    <button class="tab" onclick="switchTab(event,'logs')">Logs</button>
  </div>

  <!-- Overview -->
  <div id="tab-overview" class="tab-content active">
    <div class="toolbar">
      <button class="btn btn-accent" onclick="pingAgents()">
        <span id="pingSpinner" class="spinner"></span>⚡ Test Connections
      </button>
      <button class="btn" onclick="refreshAll()">↻ Refresh All</button>
    </div>
    <div class="section-title">Agents</div>
    <div class="agents-grid" id="agentsGrid"><div class="empty">Loading…</div></div>
  </div>

  <!-- Plan -->
  <div id="tab-plan" class="tab-content">
    <div class="toolbar"><button class="btn" onclick="loadPlan()">↻ Refresh Plan</button></div>
    <div class="panel">
      <table class="tbl">
        <thead><tr><th>#</th><th>Agent</th><th>Source</th><th>Scheduled At</th><th>Status</th><th>Downloaded</th><th>Error</th></tr></thead>
        <tbody id="planBody"><tr><td colspan="7" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Quota -->
  <div id="tab-quota" class="tab-content">
    <div class="toolbar">
      <button class="btn" onclick="refreshMetrics()">↻ Refresh Metrics</button>
      <span id="metricSpinner" class="spinner"></span>
    </div>
    <div class="panel">
      <table class="tbl">
        <thead><tr><th>Server</th><th>Type</th><th>Status</th><th>RX GB</th><th>TX GB</th><th>Monthly Limit</th><th>Allowed</th><th>Used</th><th>Remaining</th><th>Quota Used</th></tr></thead>
        <tbody id="metricsBody"><tr><td colspan="10" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- History -->
  <div id="tab-history" class="tab-content">
    <div class="toolbar"><button class="btn" onclick="loadHistory()">↻ Refresh History</button></div>
    <div class="panel">
      <table class="tbl">
        <thead><tr><th>Month</th><th>Source</th><th>Downloaded (GB)</th></tr></thead>
        <tbody id="historyBody"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Logs -->
  <div id="tab-logs" class="tab-content">
    <div class="toolbar">
      <button class="btn" onclick="refreshLogs()">↻ Refresh</button>
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="autoScrollChk" checked> auto-scroll
      </label>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>
<script>
// Helpers
const fmtBytes = b => !b ? '0 B' : b>=1e9 ? (b/1e9).toFixed(2)+' GB' : b>=1e6 ? (b/1e6).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';
const fmtTime  = s => s ? s.replace('T',' ').slice(0,19) : '—';
const $        = id => document.getElementById(id);

setInterval(() => { $('clock').textContent = new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'; }, 1000);
$('clock').textContent = new Date().toISOString().replace('T',' ').slice(0,19)+' UTC';

// Tabs
function switchTab(e, name) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  $('tab-'+name).classList.add('active');
  e.target.classList.add('active');
  ({ plan: loadPlan, quota: refreshMetrics, history: loadHistory, logs: refreshLogs }[name] || (()=>{}))();
}

// State
let pingResults = {};

async function loadState() {
  const d = await fetch('/api/state').then(r=>r.json());
  $('sDate').textContent    = d.date||'—';
  $('sStarted').textContent = fmtTime(d.started_at);
  $('sAgents').textContent  = Object.keys(d.agents||{}).length;
  $('sPlanCount').textContent = (d.plan||[]).length;
  let total = 0;
  Object.values(d.agents||{}).forEach(a=>total+=a.downloaded_bytes);
  $('sTotalDL').textContent = fmtBytes(total);
  renderAgents(d.agents||{}, d.plan||[]);
}

function renderAgents(agents, plan) {
  const grid = $('agentsGrid');
  if (!Object.keys(agents).length) { grid.innerHTML='<div class="empty">No agents configured.</div>'; return; }
  grid.innerHTML = Object.values(agents).map((a,i) => {
    const pct = a.daily_limit_gb>0 ? Math.min(100, a.downloaded_bytes/(a.daily_limit_gb*1024**3)*100) : 0;
    const ping = pingResults[a.label];
    const dotCls = ping ? (ping.ok?'ok':'fail') : '';
    const ap = plan.filter(e=>e.agent_label===a.label);
    const done = ap.filter(e=>e.status==='done').length;
    return `<div class="agent-card" style="animation-delay:${i*.06}s">
      <div class="agent-header">
        <div>
          <div class="agent-label">${a.label}</div>
          <div class="agent-host">limit: ${a.daily_limit_gb} GB/day</div>
          ${ping?`<div class="agent-host" style="margin-top:3px;color:${ping.ok?'var(--green)':'var(--red)'}">${ping.message}</div>`:''}
        </div>
        <div class="conn-dot ${dotCls}"></div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="agent-stats">
        <div class="stat"><div class="stat-val">${fmtBytes(a.downloaded_bytes)}</div><div class="stat-label">Downloaded</div></div>
        <div class="stat stat-ok"><div class="stat-val">${a.downloads_ok}</div><div class="stat-label">OK</div></div>
        <div class="stat stat-fail"><div class="stat-val">${a.downloads_fail}</div><div class="stat-label">Failed</div></div>
        <div class="stat"><div class="stat-val">${ap.length?`${done}/${ap.length}`:'—'}</div><div class="stat-label">Plan</div></div>
        <div class="stat"><div class="stat-val">${pct.toFixed(1)}%</div><div class="stat-label">Progress</div></div>
      </div>
    </div>`;
  }).join('');
}

// Ping
async function pingAgents() {
  $('pingSpinner').classList.add('active');
  try {
    const r = await fetch('/api/ping-agents').then(r=>r.json());
    r.forEach(x=>{ pingResults[x.label]={ok:x.ok,message:x.message}; });
    await loadState();
  } finally { $('pingSpinner').classList.remove('active'); }
}

// Plan
async function loadPlan() {
  const rows = await fetch('/api/plan').then(r=>r.json());
  const tb = $('planBody');
  if (!rows.length) { tb.innerHTML='<tr><td colspan="7" class="empty">No plan yet for today.</td></tr>'; return; }
  tb.innerHTML = rows.map((r,i)=>{
    const pc = {pending:'pill-pending',running:'pill-running',done:'pill-done',failed:'pill-failed'}[r.status]||'pill-pending';
    return `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td>${r.agent_label}</td>
      <td>${r.source_label}</td>
      <td style="color:var(--muted);font-size:11px">${fmtTime(r.scheduled_at)}</td>
      <td><span class="status-pill ${pc}">${r.status}</span></td>
      <td>${r.bytes_downloaded>0?fmtBytes(r.bytes_downloaded):'—'}</td>
      <td style="color:var(--red);font-size:11px">${r.error||''}</td>
    </tr>`;
  }).join('');
}

// Metrics
async function refreshMetrics() {
  $('metricSpinner').classList.add('active');
  try {
    const data = await fetch('/api/metrics').then(r=>r.json());
    const tb = $('metricsBody');
    if (!data.length) { tb.innerHTML='<tr><td colspan="10" class="empty">No sources configured.</td></tr>'; return; }
    tb.innerHTML = data.map(m=>{
      let quotaBar='', quotaPct='—';
      if (!m.is_monitor && m.monthly_limit_gb>0) {
        const pct = m.monthly_used_gb/m.monthly_allowed_gb*100;
        const cls = pct>90?'quota-crit':pct>70?'quota-warn':'quota-ok';
        quotaBar = `<div class="quota-wrap"><div class="quota-bar ${cls}" style="width:${Math.min(100,pct).toFixed(1)}%"></div></div>`;
        quotaPct = pct.toFixed(1)+'%';
      }
      return `<tr>
        <td>${m.label}${m.is_monitor?'<span class="monitor-badge">monitor</span>':''}</td>
        <td style="color:var(--muted);font-size:11px">${m.is_monitor?'monitor':'source'}</td>
        <td class="${m.reachable?'up':'down'}">${m.reachable?'● UP':'✕ DOWN'}</td>
        <td class="rx">${m.reachable?m.rx_gb.toFixed(2):'—'}</td>
        <td class="tx">${m.reachable?m.tx_gb.toFixed(2):'—'}</td>
        <td>${!m.is_monitor&&m.monthly_limit_gb>0?m.monthly_limit_gb+' GB':'—'}</td>
        <td>${!m.is_monitor&&m.monthly_allowed_gb>0?m.monthly_allowed_gb.toFixed(1)+' GB':'—'}</td>
        <td>${!m.is_monitor?(m.monthly_used_gb||0).toFixed(2)+' GB':'—'}</td>
        <td>${!m.is_monitor&&m.monthly_limit_gb>0?(m.monthly_remaining_gb||0).toFixed(2)+' GB':'—'}</td>
        <td>${quotaBar} ${quotaPct}</td>
      </tr>`;
    }).join('');
  } finally { $('metricSpinner').classList.remove('active'); }
}

// History
async function loadHistory() {
  const rows = await fetch('/api/monthly-history').then(r=>r.json());
  const tb = $('historyBody');
  if (!rows.length) { tb.innerHTML='<tr><td colspan="3" class="empty">No history yet.</td></tr>'; return; }
  tb.innerHTML = rows.map(r=>`<tr>
    <td>${r.year_month}</td>
    <td>${r.source_label}</td>
    <td class="rx">${(r.downloaded_bytes/1024**3).toFixed(3)} GB</td>
  </tr>`).join('');
}

// Logs
let lastLogCount=0;
async function refreshLogs() {
  const d = await fetch('/api/logs').then(r=>r.json());
  if (d.lines.length===lastLogCount) return;
  lastLogCount=d.lines.length;
  const box=$('logBox');
  box.innerHTML=d.lines.map(l=>{
    let cls='info';
    if(l.includes('| WARNING ')) cls='warn';
    else if(l.includes('| ERROR ')) cls='error';
    else if(l.includes('| DEBUG ')) cls='debug';
    return `<div class="log-line ${cls}">${l}</div>`;
  }).join('');
  if($('autoScrollChk').checked) box.scrollTop=box.scrollHeight;
}

async function refreshAll() { await Promise.all([loadState(), refreshMetrics()]); }

refreshAll();
setInterval(loadState,  10000);
setInterval(refreshLogs, 5000);
setInterval(refreshMetrics, 60000);
</script>
</body>
</html>
