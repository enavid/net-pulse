<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetPulse · Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #0f1318; --border: #1e2530;
    --accent: #00e5ff; --red: #ef4444; --muted: #64748b; --text: #e2e8f0;
    --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: .12; pointer-events: none;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  .logo {
    font-family: var(--sans); font-size: 28px; font-weight: 800;
    color: var(--accent); text-shadow: 0 0 24px rgba(0,229,255,.25);
    text-align: center; margin-bottom: 6px;
  }
  .sub { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 32px; }

  label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    outline: none; transition: border-color .15s; margin-bottom: 18px;
  }
  input:focus { border-color: var(--accent); }

  .error-msg {
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    color: var(--red); border-radius: 6px; padding: 10px 12px;
    font-size: 12px; margin-bottom: 18px; text-align: center;
  }

  button {
    width: 100%; padding: 11px; border-radius: 6px;
    background: rgba(0,229,255,.08); border: 1px solid var(--accent);
    color: var(--accent); font-family: var(--mono); font-size: 13px;
    font-weight: 700; cursor: pointer; transition: all .15s; letter-spacing: .5px;
  }
  button:hover { background: rgba(0,229,255,.15); }
  button:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">NetPulse</div>
  <div class="sub">coordinator panel</div>

  {% if error %}
  <div class="error-msg">Invalid username or password.</div>
  {% endif %}

  <form method="post" action="/login">
    <label>Username</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Sign In →</button>
  </form>
</div>
</body>
</html>
